version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: assistai_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-assistai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assistai_password}
      POSTGRES_DB: ${POSTGRES_DB:-assistai_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistai -d assistai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assistai_network

  # Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assistai_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-assistai}:${POSTGRES_PASSWORD:-assistai_password}@postgres:5432/${POSTGRES_DB:-assistai_db}
      SQL_ECHO: "true"
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      LLM_TIMEOUT: ${LLM_TIMEOUT}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ../frontend:/app/frontend
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - assistai_network
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn server:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
    driver: local

networks:
  assistai_network:
    driver: bridge
